version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: bioaccess_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bioaccess_db}
      POSTGRES_USER: ${POSTGRES_USER:-bioaccess_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD doit être défini}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - bioaccess_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bioaccess_user -d bioaccess_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bioaccess_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Error: REDIS_PASSWORD doit être défini} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - bioaccess_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: bioaccess_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-bioaccess_user}:${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD doit être défini}@postgres:5432/${POSTGRES_DB:-bioaccess_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Error: REDIS_PASSWORD doit être défini}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?Error: SECRET_KEY doit être défini en production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Error: JWT_SECRET_KEY doit être défini en production}
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - bioaccess_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: bioaccess_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bioaccess_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:

networks:
  bioaccess_network:
    driver: bridge